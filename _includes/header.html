<header class="pt-8 pb-8 text-center">
  <div class="wrapper">
    <!-- 站点导航 -->
    <ul class="py-3">
      {% for item in site.data.samplelist.menu %}
         <li class="inline-block px-3"><a href="{{ item.url | relative_url }}" class="hover:no-underline text-gray-600 {% if item.url == page.url %}text-blue-500{% endif %}">{{ item.title }}</a></li>
      {% endfor %}
    </ul>
  </div>
</header>
